<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/tyxar_web/images/tyxar.ico" type="image/x-icon">
    <title>Profile - Tyxar Programming Language</title>
    <link rel="stylesheet" href="/tyxar_web/styles.css">
    <link rel="stylesheet" href="/tyxar_web/profile/auth.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/tyxar_web/profile/config.js"></script>
    <script src="/tyxar_web/profile/js.js"></script>

</head>

<body>
</body>

<div class="auth-container">
    <div class="auth-dialog" id="signin-dialog">
        <h2>Sign in to Tyxar</h2>
        <form id="signin-form">
            <label for="signin-email">Email</label>
            <input type="email" id="signin-email" name="email" required autocomplete="email">
            <label for="signin-password">Password</label>
            <input type="password" id="signin-password" name="password" required autocomplete="current-password">
            <button type="submit" class="primary-btn">Sign In</button>
        </form>
        <div class="auth-divider">or</div>
        <div class="oauth-btns">
            <button class="oauth-btn" id="google-signin"><img src="/tyxar_web/images/google-icon.png" alt="Google"/>Sign in with Google</button>
            <button class="oauth-btn" id="github-signin"><img src="/tyxar_web/images/github-icon.png" alt="GitHub"/>Sign in with GitHub</button>
        </div>
        <div class="auth-switch">
            Don’t have an account? <a href="#" id="show-signup">Register</a>
        </div>
    </div>
    <div class="auth-dialog" id="signup-dialog" style="display:none;">
        <h2>Register for Tyxar</h2>
        <form id="signup-form">
            <label for="signup-firstname">First Name</label>
            <input type="text" id="signup-firstname" name="firstname" required autocomplete="given-name">
            <label for="signup-lastname">Last Name</label>
            <input type="text" id="signup-lastname" name="lastname" required autocomplete="family-name">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" name="email" required autocomplete="email">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" name="password" required autocomplete="new-password">
            <button type="submit" class="primary-btn">Register</button>
        </form>
        <div class="auth-divider">or</div>
        <div class="oauth-btns">
            <button class="oauth-btn" id="google-signup"><img src="/tyxar_web/images/google-icon.png" alt="Google"/>Sign up with Google</button>
            <button class="oauth-btn" id="github-signup"><img src="/tyxar_web/images/github-icon.png" alt="GitHub"/>Sign up with GitHub</button>
        </div>
        <div class="auth-switch">
            Already have an account? <a href="#" id="show-signin">Sign in</a>
        </div>
    </div>
</div>
</body>

</html>
