<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/tyxar_web/images/tyxar.ico" type="image/x-icon">
    <title>Dashboard - Tyxar Programming Language</title>
    <link rel="stylesheet" href="/tyxar_web/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/tyxar_web/profile/config.js"></script>
    <script src="/tyxar_web/profile/js.js"></script>
    <script src="/tyxar_web/script.js"></script>
    <script>
        function loadHTML(url, elementId) {
                fetch(url)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById(elementId).innerHTML = data;

                        // --- CRITICAL STEP ---
                        // Re-run initialization to catch the *new* links in the footer 
                        // AND the sidebar links (since they use the global selector now)
                        initializeContentLoader();

                        // Initialize header search if header was loaded
                        if (elementId === 'header' && window.initializeHeaderSearch) {
                            setTimeout(() => window.initializeHeaderSearch(), 100);
                        }
                    })
                    .catch(err => console.error(`Error loading ${url}:`, err));
            }
        document.addEventListener('DOMContentLoaded', (event) => {
                // Load Header, Footer, and Sidebar
                loadHTML('/tyxar_web/header.html', 'header');
                loadHTML('/tyxar_web/footer.html', 'footer');});
    </script>
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">Tyxar</span>
                <button id="closeSidebar" class="sidebar-close" aria-label="Close sidebar">&times;</button>
            </div>
            <div class="sidebar-profile">
                <img src="/tyxar_web/images/tyxar.ico" alt="Admin avatar" class="sidebar-avatar">
                <div class="sidebar-admin">Admin name</div>
            </div>
            <ul class="sidebar-menu">
                <li><a href="/tyxar_web/profile/dashboard/index.html"><span class="icon">🏠</span> Home</a></li>
                <li><a href="#"><span class="icon">📦</span> Products</a></li>
                <li><a href="#"><span class="icon">👤</span> Users</a></li>
                <li><a href="#"><span class="icon">🛒</span> Orders</a></li>
                <li><a href="#"><span class="icon">⚙️</span> Account</a></li>
            </ul>
        </nav>

        <!-- Hamburger for mobile -->
        <button id="openSidebar" class="hamburger" aria-label="Open sidebar">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="dashboard-header">
                <h2>Welcome back, Anish <span class="emoji">😎</span></h2>
                <div class="dashboard-time" id="dashboardTime"></div>
            </div>
            <div class="dashboard-cards">
                <div class="dashboard-card">
                    <div class="card-title">Products</div>
                    <div class="card-icon">📦</div>
                    <div class="card-value" id="productsCount">5</div>
                </div>
                <div class="dashboard-card">
                    <div class="card-title">Users</div>
                    <div class="card-icon">👤</div>
                    <div class="card-value" id="usersCount">5</div>
                </div>
                <div class="dashboard-card">
                    <div class="card-title">Orders</div>
                    <div class="card-icon">🛒</div>
                    <div class="card-value" id="ordersCount">5</div>
                </div>
            </div>
        </main>
    </div>
    <script src="/tyxar_web/profile/dashboard/dashboard.js"></script>
</body>
</html>
