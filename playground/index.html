<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/tyxar_web/images/tyxar.ico" type="image/x-icon">
    <title>Tyxar Playground</title>
    <link rel="stylesheet" href="/tyxar_web/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
    <style>
        .playground-terminal-shell {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .playground-terminal {
            min-height: 220px;
            max-height: 360px;
            padding: 1rem;
            border: 1px solid #d9d9d9;
            border-radius: 10px;
            background: #0f172a;
            color: #f8fafc;
            white-space: pre-wrap;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            overflow-y: auto;
            line-height: 1.6;
        }

        .playground-terminal-input {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.8rem 0.95rem;
            border: 1px solid #475569;
            border-radius: 8px;
            background: #020617;
            color: #f8fafc;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header id="header"></header>

    <main class="playground-page">
        <section class="playground-hero">
            <div class="container">
                <h1>TYXAR Playground</h1>
                <p>Experiment with the language in a clean, interactive space and see how natural syntax feels in practice.</p>
                <div class="playground-actions">
                    <a href="/tyxar_web/" class="btn btn-primary">Back to Home</a>
                    <a href="/tyxar_web/docs" class="btn btn-secondary">Read Docs</a>
                </div>

                <div class="playground-card">
                    <h2>Try Tyxar</h2>
                    <p>Write a short example below and run it to see the result.</p>

                    <div class="playground-editor-shell">
                        <div class="playground-editor-toolbar">
                            <strong>Editor</strong>
                            <button class="btn btn-primary" id="runButton" type="button">Run</button>
                        </div>
                        <div id="monacoEditor" class="playground-editor"></div>
                    </div>

                    <div class="playground-terminal-shell">
                        <div class="playground-terminal" id="terminal" aria-live="polite"></div>
                        <input id="terminalInput" class="playground-terminal-input" autocomplete="off" spellcheck="false" type="text" hidden>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="footer"></footer>

    <script>
        fetch('/tyxar_web/header.html')
            .then(function (response) { return response.text(); })
            .then(function (data) {
                const header = document.getElementById('header');
                if (header) header.innerHTML = data;
            })
            .catch(function (err) {
                console.error('Error loading header:', err);
            });

        fetch('/tyxar_web/footer.html')
            .then(function (response) { return response.text(); })
            .then(function (data) {
                const footer = document.getElementById('footer');
                if (footer) footer.innerHTML = data;
            })
            .catch(function (err) {
                console.error('Error loading footer:', err);
            });

        const sampleCode = `Variables:
    the count is 1 as a digit

change the count to 7
write the original value of the count
write the datatype of the count`;

        let editor;
        let currentCode = sampleCode;
        let currentSession = null;
        let isRunning = false;
        const apiBaseUrl = 'http://127.0.0.1:8000';

        const terminal = document.getElementById('terminal');
        const terminalInput = document.getElementById('terminalInput');
        const runButton = document.getElementById('runButton');

        function sleep(ms) {
            return new Promise(function (resolve) {
                setTimeout(resolve, ms);
            });
        }

        function appendOutput(text) {
            if (!text) {
                return;
            }

            terminal.textContent += text;
            terminal.scrollTop = terminal.scrollHeight;
        }

        function clearTerminal() {
            terminal.textContent = '';
            terminal.scrollTop = 0;
        }

        function setInputVisible(visible) {
            terminalInput.hidden = !visible;

            if (visible) {
                terminalInput.focus();
            }
        }

        async function runCode(code) {
            const response = await fetch(`${apiBaseUrl}/run`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });

            if (!response.ok) {
                throw new Error('Connection lost.');
            }

            return response.json();
        }

        async function getOutput(sessionId) {
            const response = await fetch(`${apiBaseUrl}/output/${sessionId}`);

            if (!response.ok) {
                throw new Error('Connection lost.');
            }

            return response.json();
        }

        async function postInput(sessionId, inputValue) {
            const response = await fetch(`${apiBaseUrl}/input`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, input: inputValue })
            });

            if (!response.ok) {
                throw new Error('Connection lost.');
            }

            return response.json();
        }

        async function sendInput() {
            if (!currentSession) {
                return;
            }

            const value = terminalInput.value;
            if (!value) {
                return;
            }

            try {
                await postInput(currentSession, value);
                appendOutput(value + '\n');
                terminalInput.value = '';
            } catch (error) {
                appendOutput('Connection lost.');
            } finally {
                setInputVisible(false);
            }
        }

        async function startExecution() {
            const code = (editor && editor.getValue ? editor.getValue() : currentCode || '').trim();
            currentSession = null;
            isRunning = true;
            runButton.disabled = true;
            clearTerminal();
            setInputVisible(false);

            try {
                const runResult = await runCode(code);
                currentSession = runResult.session_id || runResult.sessionId || runResult.id || '';

                while (true) {
                    const outputResult = await getOutput(currentSession);

                    if (outputResult && outputResult.output && outputResult.output.length) {
                        appendOutput(outputResult.output);
                    }

                    if (outputResult && !outputResult.finished) {
                        setInputVisible(true);
                    } else {
                        setInputVisible(false);
                    }

                    if (outputResult && outputResult.finished) {
                        break;
                    }

                    await sleep(75);
                }
            } catch (error) {
                appendOutput(error.message || 'Connection lost.');
            } finally {
                isRunning = false;
                runButton.disabled = false;
                setInputVisible(false);
            }
        }

        function initMonaco() {
            require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' } });
            require(['vs/editor/editor.main'], function () {
                editor = monaco.editor.create(document.getElementById('monacoEditor'), {
                    value: sampleCode,
                    language: 'tyxar',
                    automaticLayout: true,
                    minimap: { enabled: false },
                    scrollBeyondLastLine: false,
                    theme: 'vs',
                    fontSize: 15,
                    lineNumbersMinChars: 3,
                    padding: { top: 16, bottom: 16 },
                    renderLineHighlight: 'none',
                    overviewRulerLanes: 0,
                    guides: { indentation: false },
                    contextmenu: false
                });

                editor.onDidChangeModelContent(function () {
                    currentCode = editor.getValue();
                });

                runButton.addEventListener('click', function () {
                    if (!isRunning) {
                        startExecution();
                    }
                });

                terminalInput.addEventListener('keydown', function (event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        sendInput();
                    }
                });
            });
        }

        if (window.require) {
            initMonaco();
        } else {
            window.addEventListener('load', initMonaco);
        }
    </script>
</body>
</html>
