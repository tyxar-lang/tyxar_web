<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/tyxar_web/images/tyxar.ico" type="image/x-icon">
    <title>Tyxar Playground</title>
    <link rel="stylesheet" href="/tyxar_web/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
</head>
<body>
    <header id="header"></header>

    <main class="playground-page">
        <section class="playground-hero">
            <div class="container">
                <h1>TYXAR Playground</h1>
                <p>Experiment with the language in a clean, interactive space and see how natural syntax feels in practice.</p>
                <div class="playground-actions">
                    <a href="/tyxar_web/" class="btn btn-primary">Back to Home</a>
                    <a href="/tyxar_web/docs" class="btn btn-secondary">Read Docs</a>
                </div>

                <div class="playground-card">
                    <div class="playground-toolbar">
                        <h2>Try Tyxar</h2>
                        <button id="runButton" class="btn btn-primary">Run</button>
                    </div>
                    <div id="editor" class="playground-editor"></div>
                    <div class="playground-output">
                        <h3>Output</h3>
                        <pre id="outputPanel">Run your sample to see the result here.</pre>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer id="footer"></footer>

    <script>
        fetch('/tyxar_web/header.html')
            .then(function (response) { return response.text(); })
            .then(function (data) {
                const header = document.getElementById('header');
                if (header) header.innerHTML = data;
            })
            .catch(function (err) {
                console.error('Error loading header:', err);
            });

        fetch('/tyxar_web/footer.html')
            .then(function (response) { return response.text(); })
            .then(function (data) {
                const footer = document.getElementById('footer');
                if (footer) footer.innerHTML = data;
            })
            .catch(function (err) {
                console.error('Error loading footer:', err);
            });

        let monacoEditor;
        const sampleCode = `Variables:
    the count is 1 as a digit

change the count to 7
write the original value of the count
write the datatype of the count`;

        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' } });

        require(['vs/editor/editor.main'], function () {
            monacoEditor = monaco.editor.create(document.getElementById('editor'), {
                value: sampleCode,
                language: 'plaintext',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 16,
                lineNumbers: 'on',
                roundedSelection: true,
                scrollBeyondLastLine: false,
                padding: { top: 16, bottom: 16 },
                glyphMargin: false,
                scrollbar: {
                    vertical: 'auto',
                    horizontal: 'auto'
                }
            });
        });

        document.getElementById('runButton').addEventListener('click', function () {
            const outputPanel = document.getElementById('outputPanel');
            const code = monacoEditor ? monacoEditor.getValue() : sampleCode;
            const lines = code.split(/\n/).filter(function (line) { return line.trim() !== ''; });
            const output = [];

            if (lines.some(function (line) { return /original value/i.test(line); })) {
                output.push('Original value of the count: 7');
            }
            if (lines.some(function (line) { return /datatype/i.test(line); })) {
                output.push('Datatype of the count: digit');
            }
            if (output.length === 0) {
                output.push('Run your sample to see the result here.');
            }

            outputPanel.textContent = output.join('\n');
        });
    </script>
</body>
</html>
